version: "3.9"

networks:
  bookstore-network:
    driver: bridge

volumes:
  customer_db_data:
  book_db_data:
  catalog_db_data:
  cart_db_data:
  order_db_data:
  pay_db_data:
  ship_db_data:
  comment_rate_db_data:
  recommender_db_data:
  recommender_behavior_weights:
  staff_db_data:
  manager_db_data:


services:
  # ─────────────────────────────────────────────
  #  DATABASES
  # ─────────────────────────────────────────────
  customer-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - customer_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  book-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: book_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - book_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  catalog-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  cart-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cart_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - cart_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  pay-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pay_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - pay_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  ship-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ship_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - ship_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  comment-rate-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: comment_rate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - comment_rate_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  recommender-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: recommender_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - recommender_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  staff-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: staff_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - staff_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  manager-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - manager_db_data:/var/lib/postgresql/data
    networks:
      - bookstore-network

  # ─────────────────────────────────────────────
  #  APPLICATION SERVICES
  # ─────────────────────────────────────────────
  customer-service:
    build: ./customer-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "customer-secret-key-change-in-prod"
      DB_NAME: customer_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: customer-db
      DB_PORT: "5432"
      CART_SERVICE_URL: "http://cart-service:8000"
    depends_on:
      - customer-db
    networks:
      - bookstore-network
    restart: unless-stopped

  book-service:
    build: ./book-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "book-secret-key-change-in-prod"
      MANAGER_JWT_SECRET: "manager-secret-key-change-in-prod"
      STAFF_JWT_SECRET: "staff-secret-key-change-in-prod"
      DB_NAME: book_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: book-db
      DB_PORT: "5432"
    depends_on:
      - book-db
    networks:
      - bookstore-network
    restart: unless-stopped

  catalog-service:
    build: ./catalog-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "catalog-secret-key-change-in-prod"
      MANAGER_JWT_SECRET: "manager-secret-key-change-in-prod"
      STAFF_JWT_SECRET: "staff-secret-key-change-in-prod"
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: catalog-db
      DB_PORT: "5432"
    depends_on:
      - catalog-db
    networks:
      - bookstore-network
    restart: unless-stopped

  cart-service:
    build: ./cart-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "cart-secret-key-change-in-prod"
      DB_NAME: cart_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: cart-db
      DB_PORT: "5432"
    depends_on:
      - cart-db
    networks:
      - bookstore-network
    restart: unless-stopped

  order-service:
    build: ./order-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "order-secret-key-change-in-prod"
      DB_NAME: order_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: order-db
      DB_PORT: "5432"
      PAY_SERVICE_URL: "http://pay-service:8000"
      SHIP_SERVICE_URL: "http://ship-service:8000"
      CART_SERVICE_URL: "http://cart-service:8000"
    depends_on:
      - order-db
    networks:
      - bookstore-network
    restart: unless-stopped

  pay-service:
    build: ./pay-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "pay-secret-key-change-in-prod"
      DB_NAME: pay_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: pay-db
      DB_PORT: "5432"
    depends_on:
      - pay-db
    networks:
      - bookstore-network
    restart: unless-stopped

  ship-service:
    build: ./ship-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "ship-secret-key-change-in-prod"
      DB_NAME: ship_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: ship-db
      DB_PORT: "5432"
    depends_on:
      - ship-db
    networks:
      - bookstore-network
    restart: unless-stopped

  comment-rate-service:
    build: ./comment-rate-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "comment-secret-key-change-in-prod"
      DB_NAME: comment_rate_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: comment-rate-db
      DB_PORT: "5432"
    depends_on:
      - comment-rate-db
    networks:
      - bookstore-network
    restart: unless-stopped

  recommender-ai-service:
    build: ./recommender-ai-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "recommender-secret-key-change-in-prod"
      DB_NAME: recommender_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: recommender-db
      DB_PORT: "5432"
      ORDER_SERVICE_URL: "http://order-service:8000"
      BOOK_SERVICE_URL: "http://book-service:8000"
      COMMENT_RATE_SERVICE_URL: "http://comment-rate-service:8000"
      BEHAVIOR_MODEL_PATH: "/app/recommender/weights/behavior_model.pt"
      BEHAVIOR_DL_ENABLED: "True"
      BEHAVIOR_TORCH_DEVICE: "auto"
    volumes:
      - recommender_behavior_weights:/app/recommender/weights
    depends_on:
      - recommender-db
    networks:
      - bookstore-network
    restart: unless-stopped

  staff-service:
    build: ./staff-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "staff-secret-key-change-in-prod"
      DB_NAME: staff_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: staff-db
      DB_PORT: "5432"
      BOOK_SERVICE_URL: "http://book-service:8000"
    depends_on:
      - staff-db
    networks:
      - bookstore-network
    restart: unless-stopped

  manager-service:
    build: ./manager-service
    environment:
      DEBUG: "True"
      SECRET_KEY: "manager-secret-key-change-in-prod"
      DB_NAME: manager_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_HOST: manager-db
      DB_PORT: "5432"
      ORDER_SERVICE_URL: "http://order-service:8000"
      CUSTOMER_SERVICE_URL: "http://customer-service:8000"
      STAFF_SERVICE_URL: "http://staff-service:8000"
    depends_on:
      - manager-db
    networks:
      - bookstore-network
    restart: unless-stopped

  rag-service:
    build: ./rag-service
    environment:
      GOOGLE_API_KEY: "AIzaSyDhE_hNTq_mEqHeEIryUTX9htnbNiThVKs"
    networks:
      - bookstore-network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  FRONTEND  (React + Vite → nginx)
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - bookstore-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      SECRET_KEY: "gateway-secret-key-change-in-prod"
      CUSTOMER_SERVICE_URL: "http://customer-service:8000"
      BOOK_SERVICE_URL: "http://book-service:8000"
      CATALOG_SERVICE_URL: "http://catalog-service:8000"
      CART_SERVICE_URL: "http://cart-service:8000"
      ORDER_SERVICE_URL: "http://order-service:8000"
      PAY_SERVICE_URL: "http://pay-service:8000"
      SHIP_SERVICE_URL: "http://ship-service:8000"
      COMMENT_RATE_SERVICE_URL: "http://comment-rate-service:8000"
      RECOMMENDER_SERVICE_URL: "http://recommender-ai-service:8000"
      STAFF_SERVICE_URL: "http://staff-service:8000"
      MANAGER_SERVICE_URL: "http://manager-service:8000"
      RAG_SERVICE_URL: "http://rag-service:8000"
    depends_on:
      - customer-service
      - book-service
      - catalog-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - comment-rate-service
      - recommender-ai-service
      - staff-service
      - manager-service
      - rag-service
    networks:
      - bookstore-network
    restart: unless-stopped
