services:
  # Expose internal services so recommender can run on host.
  # These ports are for local dev only.
  order-service:
    ports:
      - "8001:8000"

  product-service:
    ports:
      - "8002:8000"

  comment-rate-service:
    ports:
      - "8003:8000"

  api-gateway:
    environment:
      RECOMMENDER_SERVICE_URL: "http://host.docker.internal:8006"
    depends_on:
      - customer-service
      - product-service
      - catalog-service
      - cart-service
      - order-service
      - pay-service
      - ship-service
      - comment-rate-service
      - staff-service
      - manager-service
      - rag-service
      - graph-rag-service